server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # API -> backend container (variable + resolver so nginx starts even if
    # the backend is not up yet; 127.0.0.11 is Docker's embedded DNS)
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend aistudybuddy-server;
        proxy_pass http://$backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        resolver 127.0.0.11 valid=30s;
        set $backend aistudybuddy-server;
        proxy_pass http://$backend:5000;
    }

    # The service worker must never be served stale, or clients stay pinned to
    # an old shell forever. Same for the manifest and index.html.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location = /site.webmanifest {
        add_header Cache-Control "no-cache";
        expires -1;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
        expires -1;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
