<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <script>
      // iOS Safari auto-zooms on input focus and can leave the page stuck
      // zoomed in. Since iOS 10 Safari ignores maximum-scale for user
      // pinch-zoom (accessibility preserved) but it does disable the focus
      // auto-zoom. Only apply on iOS: Android Chrome would honor it and
      // actually block pinch-zoom.
      (function () {
        var isIOS =
          /iPad|iPhone|iPod/.test(navigator.userAgent) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // iPadOS masquerades as Mac
        if (isIOS) {
          var meta = document.querySelector('meta[name="viewport"]');
          meta.setAttribute('content', meta.getAttribute('content') + ', maximum-scale=1.0');
        }
      })();
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="AI-powered study companion with spaced repetition flashcards and intelligent quizzes" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="author" content="AI Study Buddy" />

    <title>AI Study Buddy</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
